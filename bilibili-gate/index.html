<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048 - TaLEsCuber</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #faf8ef;
      font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }

    .game-container {
      --gap: 15px;
      --padding: 15px;
      width: min(500px, calc(100vw - 2rem));
      display: flex; flex-direction: column; gap: 16px;
      user-select: none; -webkit-user-select: none;
    }

    .game-header {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }

    .game-title {
      font-size: clamp(36px, 10vw, 60px); font-weight: 800; color: #776e65;
      line-height: 1;
    }

    .scores { display: flex; gap: 8px; }

    .score-box {
      background: #bbada0; color: #fff; border-radius: 4px; padding: 6px 16px;
      text-align: center; min-width: 72px;
    }

    .score-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }

    .score-value { font-size: 20px; font-weight: 700; }

    .new-game-btn {
      background: #8f7a66; color: #f9f6f2; border: none; border-radius: 4px;
      padding: 10px 20px; font-size: 16px; font-weight: 700; cursor: pointer;
      min-height: 44px; transition: background 0.15s;
    }
    .new-game-btn:hover { background: #9f8b77; }
    .new-game-btn:active { background: #7a6658; }

    .game-board {
      position: relative; width: 100%; aspect-ratio: 1;
      background: #bbada0; border-radius: 8px; padding: var(--padding);
    }

    .grid-container {
      display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
      gap: var(--gap); width: 100%; height: 100%;
    }

    .grid-cell {
      background: rgba(238, 228, 218, 0.35); border-radius: 4px;
    }

    .tile-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    }

    .tile {
      position: absolute; display: flex; align-items: center; justify-content: center;
      border-radius: 4px; font-weight: 700; z-index: 1;
    }

    .tile-existing { transition: left 150ms ease-in-out, top 150ms ease-in-out; }

    .tile-new { animation: tile-appear 200ms ease; }

    .tile-merged { animation: tile-pop 200ms ease; z-index: 10; }

    @keyframes tile-appear {
      0%   { transform: scale(0); opacity: 0; }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes tile-pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .game-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(238, 228, 218, 0.73); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 300ms ease;
      z-index: 100;
    }
    .game-overlay.active { opacity: 1; pointer-events: auto; }

    .overlay-content { text-align: center; }

    .overlay-text { font-size: 36px; font-weight: 800; color: #776e65; margin-bottom: 20px; }

    .overlay-btn {
      background: #8f7a66; color: #f9f6f2; border: none; border-radius: 4px;
      padding: 10px 24px; font-size: 16px; font-weight: 700; cursor: pointer;
      margin: 0 6px 10px; min-height: 44px; transition: background 0.15s;
    }
    .overlay-btn:hover { background: #9f8b77; }
    .overlay-btn:active { background: #7a6658; }

    @media (max-width: 400px) {
      .game-container { --gap: 10px; --padding: 10px; }
      .game-header { justify-content: center; }
      .game-title { font-size: 42px; }
      .overlay-text { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <h1 class="game-title">2048</h1>
      <div class="scores">
        <div class="score-box">
          <div class="score-label">SCORE</div>
          <div class="score-value" id="score-value">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">BEST</div>
          <div class="score-value" id="best-value">0</div>
        </div>
      </div>
      <button class="new-game-btn" id="new-game-btn">New Game</button>
    </div>

    <div class="game-board" id="game-board">
      <div class="grid-container">
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      </div>
      <div class="tile-container" id="tile-container"></div>

      <div class="game-overlay" id="overlay-lose">
        <div class="overlay-content">
          <p class="overlay-text">Game Over!</p>
          <button class="overlay-btn" id="try-again-btn">Try Again</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      // ── DOM refs ──────────────────────────────────
      const boardEl = document.getElementById('game-board');
      const tileContainer = document.getElementById('tile-container');
      const scoreEl = document.getElementById('score-value');
      const bestEl = document.getElementById('best-value');
      const overlayLose = document.getElementById('overlay-lose');
      const newGameBtn = document.getElementById('new-game-btn');
      const tryAgainBtn = document.getElementById('try-again-btn');

      // ── Constants ─────────────────────────────────
      const TILE_COLORS = {
        2:     { bg: '#eee4da', color: '#776e65' },
        4:     { bg: '#ede0c8', color: '#776e65' },
        8:     { bg: '#f2b179', color: '#f9f6f2' },
        16:    { bg: '#f59563', color: '#f9f6f2' },
        32:    { bg: '#f67c5f', color: '#f9f6f2' },
        64:    { bg: '#f65e3b', color: '#f9f6f2' },
        128:   { bg: '#edcf72', color: '#f9f6f2' },
        256:   { bg: '#edcc61', color: '#f9f6f2' },
        512:   { bg: '#edc850', color: '#f9f6f2' },
        1024:  { bg: '#edc53f', color: '#f9f6f2' },
        2048:  { bg: '#edc22e', color: '#f9f6f2' },
      };
      function tileColor(v) { return TILE_COLORS[v] || { bg: '#3c3a32', color: '#f9f6f2' }; }

      function fontSize(value, cellSize) {
        if (value < 100)   return cellSize * 0.42 + 'px';
        if (value < 1000)  return cellSize * 0.35 + 'px';
        if (value < 10000) return cellSize * 0.28 + 'px';
        return cellSize * 0.22 + 'px';
      }

      // ── State ─────────────────────────────────────
      let grid = [];          // Tile[][] 4×4 (Tile or null)
      let score = 0;
      let bestScore = 0;
      let gameOver = false;
      let won = false;
      let keepPlaying = false;
      let tileIdCounter = 0;
      let isAnimating = false;

      // ── localStorage helpers ──────────────────────
      const LS_KEY = 'bilibili-gate-2048-best';
      function loadBestScore() {
        try { bestScore = parseInt(localStorage.getItem(LS_KEY)) || 0; }
        catch (_) { bestScore = 0; }
      }
      function saveBestScore() {
        try { localStorage.setItem(LS_KEY, String(bestScore)); }
        catch (_) { /* private browsing */ }
      }

      // ── Tile creation ─────────────────────────────
      function createTile(value) { return { id: ++tileIdCounter, value: value }; }

      function emptyCells() {
        const cells = [];
        for (let r = 0; r < 4; r++)
          for (let c = 0; c < 4; c++)
            if (grid[r][c] === null) cells.push({ r, c });
        return cells;
      }

      // ── Board metrics ─────────────────────────────
      function boardMetrics() {
        const boardWidth = boardEl.clientWidth;
        const style = getComputedStyle(boardEl);
        const padding = parseFloat(style.getPropertyValue('--padding')) || 15;
        const gap = parseFloat(style.getPropertyValue('--gap')) || 15;
        const cellSize = (boardWidth - 2 * padding - 3 * gap) / 4;
        return { boardWidth, padding, gap, cellSize };
      }

      // ── Slide one line ────────────────────────────
      function slideLine(line) {
        const tiles = [];
        for (let i = 0; i < 4; i++) { if (line[i] !== null) tiles.push(line[i]); }

        let points = 0;
        const consumedIds = [];

        for (let i = 0; i < tiles.length - 1; i++) {
          if (tiles[i].value === tiles[i + 1].value) {
            tiles[i].value *= 2;
            points += tiles[i].value;
            consumedIds.push(tiles[i + 1].id);
            tiles.splice(i + 1, 1);
          }
        }

        const result = [null, null, null, null];
        for (let i = 0; i < tiles.length; i++) result[i] = tiles[i];

        return { result, points, consumedIds };
      }

      // ── Grid transformations ──────────────────────
      function cloneGrid() {
        return grid.map(row => row.map(t => t ? { id: t.id, value: t.value } : null));
      }

      function gridsEqual(a, b) {
        for (let r = 0; r < 4; r++)
          for (let c = 0; c < 4; c++) {
            const ta = a[r][c], tb = b[r][c];
            if ((ta === null) !== (tb === null)) return false;
            if (ta && ta.id !== tb.id) return false;
          }
        return true;
      }

      function transpose(g) {
        const t = Array.from({ length: 4 }, () => [null, null, null, null]);
        for (let r = 0; r < 4; r++)
          for (let c = 0; c < 4; c++)
            t[c][r] = g[r][c];
        return t;
      }

      function reverseRows(g) {
        return g.map(row => [...row].reverse());
      }

      // ── Spawn ─────────────────────────────────────
      function spawnTile() {
        const cells = emptyCells();
        if (cells.length === 0) return;
        const { r, c } = cells[Math.floor(Math.random() * cells.length)];
        grid[r][c] = createTile(Math.random() < 0.9 ? 2 : 4);
      }

      // ── Game state checks ─────────────────────────
      function canMove() {
        for (let r = 0; r < 4; r++)
          for (let c = 0; c < 4; c++) {
            if (grid[r][c] === null) return true;
            const v = grid[r][c].value;
            if (c < 3 && grid[r][c + 1] && grid[r][c + 1].value === v) return true;
            if (r < 3 && grid[r + 1][c] && grid[r + 1][c].value === v) return true;
          }
        return false;
      }

      function checkWin() {
        if (keepPlaying) return;
        for (let r = 0; r < 4; r++)
          for (let c = 0; c < 4; c++)
            if (grid[r][c] && grid[r][c].value >= 2048) { won = true; }
      }

      function checkGameOver() {
        if (!canMove()) gameOver = true;
      }

      // ── Move ──────────────────────────────────────
      function move(direction) {
        if (gameOver || isAnimating) return;
        if (won && !keepPlaying) return;

        const oldGrid = cloneGrid();

        // Transform so the slide direction becomes "left"
        let workGrid;
        if (direction === 'left') {
          workGrid = cloneGrid();
        } else if (direction === 'right') {
          workGrid = reverseRows(cloneGrid());
        } else if (direction === 'up') {
          workGrid = transpose(cloneGrid());
        } else if (direction === 'down') {
          const src = cloneGrid();
          workGrid = Array.from({ length: 4 }, () => [null, null, null, null]);
          for (let r = 0; r < 4; r++)
            for (let c = 0; c < 4; c++)
              workGrid[c][3 - r] = src[r][c];
        }

        let totalPoints = 0;
        const consumedIds = [];

        for (let r = 0; r < 4; r++) {
          const { result, points, consumedIds: ids } = slideLine(workGrid[r]);
          workGrid[r] = result;
          totalPoints += points;
          consumedIds.push(...ids);
        }

        // Inverse transform
        if (direction === 'up') {
          grid = transpose(workGrid);
        } else if (direction === 'down') {
          const result = Array.from({ length: 4 }, () => [null, null, null, null]);
          for (let r = 0; r < 4; r++)
            for (let c = 0; c < 4; c++)
              result[r][c] = workGrid[c][3 - r];
          grid = result;
        } else if (direction === 'right') {
          grid = reverseRows(workGrid);
        } else {
          grid = workGrid;
        }

        if (gridsEqual(oldGrid, grid)) return;

        score += totalPoints;
        if (score > bestScore) { bestScore = score; saveBestScore(); }

        spawnTile();
        checkWin();
        checkGameOver();
        render(oldGrid);

        if (won && !keepPlaying) showWinOverlay();
        else if (gameOver) showLoseOverlay();
      }

      // ── Render ────────────────────────────────────
      function render(oldGrid) {
        isAnimating = true;
        updateScores();

        const { padding, gap, cellSize } = boardMetrics();
        const oldPositions = {};
        for (let r = 0; r < 4; r++)
          for (let c = 0; c < 4; c++) {
            const t = oldGrid[r][c];
            if (t) oldPositions[t.id] = { row: r, col: c, value: t.value };
          }

        // Track which existing DOM elements are still needed
        const existingEls = {};
        tileContainer.querySelectorAll('.tile').forEach(el => {
          existingEls[el.dataset.tileId] = el;
        });
        const usedIds = new Set();
        const fragment = document.createDocumentFragment();

        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            const tile = grid[r][c];
            if (!tile) continue;

            usedIds.add(tile.id);
            const x = padding + c * (cellSize + gap);
            const y = padding + r * (cellSize + gap);
            const old = oldPositions[tile.id];

            let el = existingEls[tile.id];
            if (el) {
              // Existing tile — update position and check for merge
              el.classList.remove('tile-new', 'tile-merged');
              el.classList.add('tile-existing');
              el.style.left = x + 'px';
              el.style.top = y + 'px';
              el.style.width = el.style.height = cellSize + 'px';
              el.style.fontSize = fontSize(tile.value, cellSize);

              if (parseInt(el.dataset.value) !== tile.value) {
                el.dataset.value = tile.value;
                el.textContent = tile.value;
                const colors = tileColor(tile.value);
                el.style.backgroundColor = colors.bg;
                el.style.color = colors.color;
                // Merge: after slide completes, trigger pop
                setTimeout(() => {
                  el.classList.add('tile-merged');
                  el.addEventListener('animationend', () => el.classList.remove('tile-merged'), { once: true });
                }, 150);
              }
            } else {
              // New tile
              el = document.createElement('div');
              el.className = 'tile tile-new';
              el.dataset.tileId = tile.id;
              el.dataset.value = tile.value;
              el.style.width = el.style.height = cellSize + 'px';
              el.style.left = x + 'px';
              el.style.top = y + 'px';
              el.style.fontSize = fontSize(tile.value, cellSize);
              const colors = tileColor(tile.value);
              el.style.backgroundColor = colors.bg;
              el.style.color = colors.color;
              el.textContent = tile.value;

              el.addEventListener('animationend', () => {
                el.classList.remove('tile-new');
                el.classList.add('tile-existing');
              }, { once: true });
            }

            fragment.appendChild(el);
          }
        }

        // Remove consumed tiles
        for (const id in existingEls) {
          if (!usedIds.has(parseInt(id))) existingEls[id].remove();
        }

        tileContainer.innerHTML = '';
        tileContainer.appendChild(fragment);

        setTimeout(() => { isAnimating = false; }, 300);
      }

      function updateScores() {
        scoreEl.textContent = score;
        bestEl.textContent = bestScore;
      }

      // ── Overlays ──────────────────────────────────
      function buildWinOverlay() {
        // Reuse lose overlay as base and add keep-playing overlay
        const existing = document.getElementById('overlay-win');
        if (existing) return existing;
        const ov = document.createElement('div');
        ov.className = 'game-overlay';
        ov.id = 'overlay-win';
        ov.innerHTML = '<div class="overlay-content"><p class="overlay-text">You Win!</p><button class="overlay-btn" id="keep-playing-btn">Keep Playing</button><button class="overlay-btn" id="win-new-game-btn">New Game</button></div>';
        boardEl.appendChild(ov);
        ov.querySelector('#keep-playing-btn').addEventListener('click', () => {
          keepPlaying = true; won = false;
          ov.classList.remove('active');
          if (gameOver) return;
          isAnimating = false;
        });
        ov.querySelector('#win-new-game-btn').addEventListener('click', resetGame);
        return ov;
      }

      function showWinOverlay() {
        const ov = buildWinOverlay();
        setTimeout(() => ov.classList.add('active'), 300);
      }

      function showLoseOverlay() {
        setTimeout(() => overlayLose.classList.add('active'), 300);
      }

      // ── Reset ─────────────────────────────────────
      function resetGame() {
        score = 0;
        gameOver = false;
        won = false;
        keepPlaying = false;
        isAnimating = false;
        tileIdCounter = 0;
        grid = Array.from({ length: 4 }, () => [null, null, null, null]);
        tileContainer.innerHTML = '';

        const ovWin = document.getElementById('overlay-win');
        if (ovWin) ovWin.classList.remove('active');
        overlayLose.classList.remove('active');

        spawnTile();
        spawnTile();
        render(grid.map(r => [null, null, null, null]));
      }

      // ── Input: keyboard ───────────────────────────
      function setupKeyboard() {
        document.addEventListener('keydown', e => {
          const map = {
            ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
            w: 'up', W: 'up', s: 'down', S: 'down', a: 'left', A: 'left', d: 'right', D: 'right',
          };
          const dir = map[e.key];
          if (dir) { e.preventDefault(); move(dir); }
        });
      }

      // ── Input: touch ──────────────────────────────
      function setupTouch() {
        let sx = 0, sy = 0;
        const SWIPE = 30;

        boardEl.addEventListener('touchstart', e => {
          sx = e.touches[0].clientX;
          sy = e.touches[0].clientY;
        }, { passive: true });

        boardEl.addEventListener('touchend', e => {
          if (sx === 0 && sy === 0) return;
          const dx = e.changedTouches[0].clientX - sx;
          const dy = e.changedTouches[0].clientY - sy;
          const absDx = Math.abs(dx), absDy = Math.abs(dy);
          if (Math.max(absDx, absDy) < SWIPE) return;
          e.preventDefault();
          if (absDx > absDy) move(dx > 0 ? 'right' : 'left');
          else               move(dy > 0 ? 'down' : 'up');
          sx = 0; sy = 0;
        });

        boardEl.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });
      }

      // ── Init ──────────────────────────────────────
      function init() {
        loadBestScore();
        grid = Array.from({ length: 4 }, () => [null, null, null, null]);
        score = 0;
        updateScores();
        spawnTile();
        spawnTile();
        render(grid.map(r => [null, null, null, null]));
        setupKeyboard();
        setupTouch();
        newGameBtn.addEventListener('click', resetGame);
        tryAgainBtn.addEventListener('click', resetGame);
      }

      init();
    })();
  </script>
</body>
</html>
